name: security

on:
  pull_request:
  push:
    branches: [main]

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm --prefix web ci
      - run: npm --prefix web audit
      - run: npm --prefix web run build
      - run: npm --prefix web test

  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install --require-hashes -r api/requirements.lock
      - run: python -m pip install pip-audit bandit pytest
      - run: python -m pip_audit --requirement api/requirements.lock --disable-pip --no-deps
      - run: python -m bandit -r api/app
      - run: python -m pytest
